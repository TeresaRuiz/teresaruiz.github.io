<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0e0e12">
<title>Calculadora de Notas</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e0e12;
  --surface: #1a1a22;
  --surface2: #13131a;
  --border: #2e2e3e;
  --accent: #c8f751;
  --teal: #3bb8c3;
  --text: #f0f0f5;
  --muted: #7a7a90;
  --pass: #c8f751;
  --fail: #ff5f5f;
  --save: #7b6ef6;
  --orange: #f5a623;
  --tap: rgba(255,255,255,0.06);
  --radius: 14px;
  --touch: 48px; /* minimum touch target */
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--text);
  font-family: 'Syne', sans-serif;
  min-height: 100vh;
  padding: 1.2rem 0.85rem 6rem;
  -webkit-text-size-adjust: 100%;
}
.grid-bg {
  position: fixed; inset: 0; z-index: 0;
  background-image:
    linear-gradient(rgba(200,247,81,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(200,247,81,0.02) 1px, transparent 1px);
  background-size: 36px 36px; pointer-events: none;
}
.container { position: relative; z-index: 1; max-width: 860px; margin: 0 auto; }

/* ── HEADER ── */
header { text-align: center; margin-bottom: 1.4rem; }
header .label {
  font-family: 'DM Mono', monospace; font-size: 0.65rem; letter-spacing: 0.2em;
  color: var(--accent); text-transform: uppercase; margin-bottom: 0.35rem;
}
header h1 { font-size: clamp(1.7rem, 7vw, 3rem); font-weight: 800; letter-spacing: -0.02em; line-height: 1.1; }
header h1 span { color: var(--accent); }

/* ── TOOLBAR ── */
.toolbar {
  display: flex; gap: 0.5rem; align-items: center;
  margin-bottom: 1rem; flex-wrap: wrap;
}
.toolbar-btn {
  display: flex; align-items: center; justify-content: center; gap: 0.35rem;
  border: none; border-radius: 10px; cursor: pointer;
  font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.8rem;
  min-height: var(--touch); padding: 0 0.9rem;
  transition: opacity 0.15s, transform 0.1s;
  -webkit-user-select: none; user-select: none;
}
.toolbar-btn:active { transform: scale(0.95); opacity: 0.85; }
.btn-save   { background: var(--save); color: #fff; }
.btn-avance { background: var(--orange); color: #fff; }
.btn-undo, .btn-redo {
  background: var(--surface); border: 1px solid var(--border); color: var(--muted);
  padding: 0 0.75rem;
}
.btn-undo:disabled, .btn-redo:disabled { opacity: 0.3; }
.save-status {
  font-family: 'DM Mono', monospace; font-size: 0.68rem; color: var(--muted);
  margin-left: auto; white-space: nowrap;
}
.save-status.saved   { color: var(--pass); }
.save-status.unsaved { color: var(--orange); }

/* ── CONFIG BAR ── */
.config-bar {
  display: flex; gap: 0.8rem; flex-wrap: wrap; align-items: center;
  margin-bottom: 1rem; padding: 0.75rem 1rem;
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  font-size: 0.82rem; color: var(--muted);
}
.config-bar label { display: flex; align-items: center; gap: 0.45rem; }
.config-bar input[type="number"] {
  background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
  color: var(--text); font-family: 'DM Mono', monospace; font-size: 0.9rem;
  padding: 0.35rem 0.5rem; width: 62px; text-align: center; outline: none;
  min-height: 38px;
}
.config-bar input:focus { border-color: var(--accent); }

/* ── MODULE CARD ── */
.module-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); margin-bottom: 0.75rem; overflow: hidden;
}

.module-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0.85rem 1rem;
  background: linear-gradient(135deg, #1e2d3a, #1a2535);
  cursor: pointer; user-select: none; gap: 0.6rem;
  min-height: var(--touch);
}
.module-header:active { background: linear-gradient(135deg, #253e50, #22334a); }

.module-left { display: flex; align-items: center; gap: 0.55rem; flex: 1; min-width: 0; }
.module-dot  { width: 8px; height: 8px; border-radius: 50%; background: var(--teal); flex-shrink: 0; }
.module-name-display {
  font-size: 1rem; font-weight: 700; color: var(--text);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1;
}
.module-name-display.placeholder { color: var(--muted); font-style: italic; font-weight: 400; }

.module-right { display: flex; align-items: center; gap: 0.6rem; flex-shrink: 0; }
.module-final-badge { display: flex; flex-direction: column; align-items: flex-end; }
.module-final-label {
  font-family: 'DM Mono', monospace; font-size: 0.52rem; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--muted);
}
.module-final-value {
  font-size: 1.45rem; font-weight: 800; line-height: 1;
  transition: color 0.3s; font-family: 'DM Mono', monospace;
}
.module-final-value.pass { color: var(--pass); }
.module-final-value.fail { color: var(--fail); }
.module-final-value.neutral { color: var(--muted); }

.chevron {
  width: 18px; height: 18px; color: var(--muted);
  transition: transform 0.3s ease; flex-shrink: 0;
}
.module-card.open .chevron { transform: rotate(180deg); }

/* ── COLLAPSIBLE BODY ── */
.module-body { max-height: 0; overflow: hidden; transition: max-height 0.4s cubic-bezier(0.4,0,0.2,1); }
.module-card.open .module-body { max-height: 3000px; }

/* Name edit bar */
.name-edit-bar {
  display: flex; align-items: center; gap: 0.5rem;
  padding: 0.65rem 0.9rem; border-bottom: 1px solid var(--border);
  background: rgba(59,184,195,0.04);
}
.name-edit-bar label { font-size: 0.75rem; color: var(--muted); white-space: nowrap; flex-shrink: 0; }
.module-name-input {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text);
  font-family: 'Syne', sans-serif; font-size: 0.92rem; font-weight: 700;
  flex: 1; outline: none; padding: 0.45rem 0.7rem; min-height: 40px;
  transition: border-color 0.2s;
}
.module-name-input:focus { border-color: var(--teal); }

/* ── ACTIVITY CARDS (mobile-first instead of table) ── */
.activities-list { padding: 0.5rem 0.75rem; display: flex; flex-direction: column; gap: 0.5rem; }

.activity-card {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; padding: 0.65rem 0.75rem;
  display: flex; flex-direction: column; gap: 0.45rem;
}
.activity-row1 { display: flex; align-items: center; gap: 0.5rem; }
.activity-row2 { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }

.act-name-input {
  background: transparent; border: none; border-bottom: 1px solid var(--border);
  color: var(--text); font-family: 'Syne', sans-serif; font-size: 0.9rem; font-weight: 700;
  flex: 1; outline: none; padding: 0.2rem 0; min-height: 36px;
  transition: border-color 0.2s;
}
.act-name-input:focus { border-color: var(--accent); }

.act-delete-btn {
  background: none; border: none; color: var(--muted); cursor: pointer;
  font-size: 1rem; padding: 0.3rem; border-radius: 6px;
  min-width: 36px; min-height: 36px;
  display: flex; align-items: center; justify-content: center;
  transition: color 0.2s;
}
.act-delete-btn:active { color: var(--fail); }

.act-field {
  display: flex; flex-direction: column; gap: 0.18rem; align-items: center; flex: 1;
}
.act-field-label {
  font-family: 'DM Mono', monospace; font-size: 0.58rem; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--muted);
}
.act-number-input {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text);
  font-family: 'DM Mono', monospace; font-size: 1rem; font-weight: 500;
  width: 100%; text-align: center; outline: none;
  padding: 0.4rem 0.3rem; min-height: 42px;
  transition: border-color 0.2s;
}
.act-number-input:focus { border-color: var(--accent); }

.act-ng-wrap {
  display: flex; flex-direction: column; gap: 0.18rem; align-items: center; flex: 1;
}
.nota-global {
  font-family: 'DM Mono', monospace; font-size: 1rem; font-weight: 600;
  padding: 0.4rem 0.5rem; border-radius: 8px; min-height: 42px;
  min-width: 60px; display: flex; align-items: center; justify-content: center;
  text-align: center; transition: all 0.3s; width: 100%;
}
.nota-global.has-val { background: rgba(200,247,81,0.1); color: var(--pass); }
.nota-global.zero    { background: rgba(255,95,95,0.08); color: var(--fail); }
.nota-global.empty   { color: var(--muted); background: var(--bg); border: 1px solid var(--border); }

.pct-total-bar {
  display: flex; justify-content: space-between; align-items: center;
  padding: 0.45rem 0.75rem; margin: 0 0.75rem 0.5rem;
  background: rgba(0,0,0,0.2); border-radius: 8px;
  font-family: 'DM Mono', monospace; font-size: 0.72rem; color: var(--muted);
}
.pct-val.over { color: var(--fail); }
.pct-val.ok   { color: var(--pass); }

/* Module footer */
.module-footer {
  display: flex; gap: 0.5rem; padding: 0.65rem 0.75rem;
  border-top: 1px solid var(--border); background: rgba(0,0,0,0.15); flex-wrap: wrap;
}
.btn-add-row {
  background: transparent; border: 1px dashed var(--teal); color: var(--teal);
  border-radius: 9px; cursor: pointer; font-family: 'Syne', sans-serif; font-weight: 700;
  font-size: 0.8rem; padding: 0.55rem 1rem; min-height: var(--touch);
  transition: background 0.2s;
}
.btn-add-row:active { background: rgba(59,184,195,0.1); }
.btn-remove-module {
  background: transparent; border: 1px dashed var(--fail); color: var(--fail);
  border-radius: 9px; cursor: pointer; font-family: 'Syne', sans-serif; font-weight: 700;
  font-size: 0.8rem; padding: 0.55rem 1rem; min-height: var(--touch); margin-left: auto;
  transition: background 0.2s;
}
.btn-remove-module:active { background: rgba(255,95,95,0.1); }

/* Add module btn */
.btn-add-module {
  background: transparent; border: 2px dashed var(--accent); color: var(--accent);
  width: 100%; padding: 0.9rem; font-size: 0.95rem; border-radius: var(--radius);
  margin-bottom: 1.2rem; cursor: pointer;
  font-family: 'Syne', sans-serif; font-weight: 700; min-height: 52px;
}
.btn-add-module:active { background: rgba(200,247,81,0.07); }

/* ── SUMMARY ── */
.summary-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 1.1rem;
}
.summary-title {
  font-size: 0.88rem; font-weight: 700; color: var(--muted);
  letter-spacing: 0.04em; margin-bottom: 0.85rem;
  display: flex; align-items: center; gap: 0.4rem;
}
.summary-title .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); display: inline-block; }
.summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.6rem; }
.stat-box {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 10px; padding: 0.75rem 0.5rem; text-align: center;
}
.stat-label {
  font-family: 'DM Mono', monospace; font-size: 0.56rem; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--muted); margin-bottom: 0.2rem;
}
.stat-value { font-size: 1.7rem; font-weight: 800; line-height: 1; transition: color 0.3s; }
.stat-value.pass { color: var(--pass); }
.stat-value.fail { color: var(--fail); }
.stat-value.neutral { color: var(--text); }
.progress-wrap { margin-top: 0.85rem; background: var(--bg); border-radius: 100px; height: 7px; overflow: hidden; }
.progress-bar {
  height: 100%; border-radius: 100px; background: var(--accent);
  transition: width 0.5s cubic-bezier(.4,0,.2,1), background 0.4s; width: 0%;
}
.progress-bar.fail { background: var(--fail); }
.verdict {
  margin-top: 0.65rem; text-align: center; font-size: 0.88rem; font-weight: 700;
  padding: 0.55rem; border-radius: 9px; transition: all 0.3s;
}
.verdict.pass    { background: rgba(200,247,81,0.1); color: var(--pass); }
.verdict.fail    { background: rgba(255,95,95,0.1);  color: var(--fail); }
.verdict.neutral { background: var(--border); color: var(--muted); }

/* ── AVANCE MODAL ── */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.8); backdrop-filter: blur(4px);
  display: flex; align-items: flex-end; /* slide up from bottom on mobile */
  opacity: 0; pointer-events: none; transition: opacity 0.25s;
}
@media (min-width: 600px) { .modal-overlay { align-items: center; } }
.modal-overlay.open { opacity: 1; pointer-events: all; }

.modal {
  background: var(--surface); border: 1px solid var(--border);
  width: 100%; max-width: 580px; margin: 0 auto;
  max-height: 92vh; overflow-y: auto; -webkit-overflow-scrolling: touch;
  border-radius: 20px 20px 0 0; padding: 1.2rem 1rem 2rem;
  transform: translateY(60px); transition: transform 0.35s cubic-bezier(0.34,1.2,0.64,1);
}
@media (min-width: 600px) {
  .modal { border-radius: 20px; max-height: 88vh; transform: translateY(30px); }
}
.modal-overlay.open .modal { transform: translateY(0); }

/* drag handle */
.modal-handle {
  width: 38px; height: 4px; border-radius: 4px; background: var(--border);
  margin: 0 auto 1rem;
}
@media (min-width: 600px) { .modal-handle { display: none; } }

.modal-header {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.1rem;
}
.modal-title { font-size: 1.15rem; font-weight: 800; }
.modal-title span { color: var(--orange); }
.modal-close {
  background: none; border: 1px solid var(--border); color: var(--muted);
  border-radius: 8px; cursor: pointer; padding: 0.3rem 0.65rem;
  font-size: 1rem; min-height: var(--touch); min-width: var(--touch);
  display: flex; align-items: center; justify-content: center;
}

/* Ring */
.avance-hero { display: flex; flex-direction: column; align-items: center; margin-bottom: 1.2rem; }
.ring-wrap { position: relative; width: 130px; height: 130px; margin-bottom: 0.7rem; }
.ring-wrap svg { transform: rotate(-90deg); }
.ring-bg   { fill: none; stroke: var(--border); stroke-width: 10; }
.ring-fill { fill: none; stroke: var(--orange); stroke-width: 10; stroke-linecap: round;
             transition: stroke-dashoffset 0.7s cubic-bezier(0.4,0,0.2,1); }
.ring-text {
  position: absolute; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}
.ring-pct { font-size: 1.8rem; font-weight: 800; color: var(--orange); line-height: 1; font-family: 'DM Mono', monospace; }
.ring-sub  { font-size: 0.6rem; color: var(--muted); font-family: 'DM Mono', monospace; letter-spacing: 0.1em; }

.avance-uv-row {
  display: flex; gap: 1.2rem; font-family: 'DM Mono', monospace; font-size: 0.8rem; color: var(--muted);
}
.avance-uv-row strong { color: var(--text); font-size: 0.95rem; }

/* Config UV */
.total-uv-config {
  display: flex; align-items: center; gap: 0.6rem; margin-bottom: 1rem;
  padding: 0.6rem 0.8rem; background: var(--bg); border-radius: 10px;
  border: 1px solid var(--border); font-size: 0.8rem; color: var(--muted);
}
.total-uv-config input {
  background: var(--surface); border: 1px solid var(--border); border-radius: 7px;
  color: var(--text); font-family: 'DM Mono', monospace; font-size: 0.9rem;
  padding: 0.3rem 0.5rem; width: 65px; text-align: center; outline: none;
  min-height: 38px;
}

/* Cycle label */
.cycle-label {
  font-family: 'DM Mono', monospace; font-size: 0.6rem; letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--orange); margin: 1rem 0 0.35rem;
  opacity: 0.85;
}
.cycle-label:first-child { margin-top: 0; }

/* UV subject row */
.uv-subjects { display: flex; flex-direction: column; gap: 0.45rem; margin-bottom: 1rem; }
.uv-row {
  display: flex; align-items: center; gap: 0.65rem;
  padding: 0.7rem 0.8rem; border-radius: 10px;
  background: var(--bg); border: 1px solid var(--border);
  cursor: pointer; transition: border-color 0.2s, background 0.2s;
  min-height: var(--touch);
}
.uv-row:active { background: rgba(245,166,35,0.05); }
.uv-row.approved { background: rgba(245,166,35,0.07); border-color: rgba(245,166,35,0.45); }

.uv-check {
  width: 24px; height: 24px; border-radius: 7px; flex-shrink: 0;
  border: 2px solid var(--border); background: var(--surface2);
  display: flex; align-items: center; justify-content: center;
  transition: all 0.18s; font-size: 0.8rem; font-weight: 700;
}
.uv-row.approved .uv-check { background: var(--orange); border-color: var(--orange); color: #fff; }

.uv-name { flex: 1; font-size: 0.85rem; font-weight: 700; line-height: 1.3; }

.uv-input-wrap { display: flex; align-items: center; gap: 0.3rem; flex-shrink: 0; }
.uv-input {
  background: var(--surface); border: 1px solid var(--border); border-radius: 7px;
  color: var(--text); font-family: 'DM Mono', monospace; font-size: 0.88rem;
  padding: 0.3rem 0.35rem; width: 46px; text-align: center; outline: none;
  min-height: 36px;
}
.uv-input:focus { border-color: var(--orange); }
.uv-label { font-family: 'DM Mono', monospace; font-size: 0.68rem; color: var(--muted); }

.uv-add-btn {
  background: transparent; border: 1px dashed var(--orange); color: var(--orange);
  border-radius: 10px; width: 100%; padding: 0.7rem;
  font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.82rem;
  cursor: pointer; min-height: var(--touch);
}
.uv-add-btn:active { background: rgba(245,166,35,0.07); }

.avance-section-title {
  font-size: 0.68rem; font-family: 'DM Mono', monospace; letter-spacing: 0.15em;
  text-transform: uppercase; color: var(--muted); margin-bottom: 0.6rem;
}

.total-uv-bar {
  display: flex; justify-content: space-between; align-items: center;
  padding: 0.65rem 0.85rem; border-radius: 10px;
  background: rgba(245,166,35,0.08); border: 1px solid rgba(245,166,35,0.2);
  font-family: 'DM Mono', monospace; font-size: 0.78rem; color: var(--muted);
  margin-top: 0.85rem;
}
.total-uv-bar strong { color: var(--orange); font-size: 1rem; }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 1.5rem; left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--save); color: #fff;
  font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.85rem;
  padding: 0.65rem 1.3rem; border-radius: 100px;
  transition: transform 0.35s cubic-bezier(0.34,1.4,0.64,1); z-index: 999;
  pointer-events: none; white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* ── DESKTOP TABLE (≥640px) ── */
@media (min-width: 640px) {
  .activities-list { display: none; }
  .activities-table-wrap { display: block; overflow-x: auto; }
  .pct-total-bar { margin: 0; border-radius: 0; border-left: none; border-right: none; border-top: none; }

  .activities-table { width: 100%; border-collapse: collapse; }
  .activities-table thead tr { background: var(--teal); }
  .activities-table thead th {
    padding: 0.55rem 0.9rem; text-align: left; font-size: 0.75rem;
    font-weight: 700; letter-spacing: 0.04em; color: #fff;
  }
  .activities-table thead th:not(:first-child) { text-align: center; }
  .activities-table tbody tr { border-bottom: 1px solid var(--border); }
  .activities-table tbody tr:last-child { border-bottom: none; }
  .activities-table td { padding: 0.42rem 0.75rem; }
  .activities-table td:not(:first-child) { text-align: center; }

  .td-input {
    background: var(--surface2); border: 1px solid transparent;
    border-radius: 6px; color: var(--text);
    font-family: 'DM Mono', monospace; font-size: 0.84rem;
    padding: 0.3rem 0.45rem; outline: none;
    transition: border-color 0.2s; width: 100%;
  }
  .td-input:focus { border-color: var(--accent); }
  .td-input.num { text-align: center; width: 72px; }
  .btn-remove-row {
    background: none; border: none; color: var(--muted); cursor: pointer;
    font-size: 0.85rem; padding: 0.2rem 0.4rem; border-radius: 4px;
  }
  .btn-remove-row:hover { color: var(--fail); }
  .pct-total-row td {
    font-family: 'DM Mono', monospace; font-size: 0.72rem;
    padding: 0.35rem 0.75rem; color: var(--muted); background: rgba(0,0,0,0.2);
  }
  .pct-total-row .pct-val { text-align: center; }
}
@media (max-width: 639px) {
  .activities-table-wrap { display: none; }
  .pct-total-bar { display: flex; }
}

@keyframes fadeDown { from{opacity:0;transform:translateY(-12px)} to{opacity:1;transform:none} }
@keyframes fadeUp   { from{opacity:0;transform:translateY(10px)}  to{opacity:1;transform:none} }
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="container">

  <header>
    <div class="label"></div>
    <h1>Calculadora<br>de <span>Notas</span></h1>
  </header>

  <!-- Toolbar -->

<script>
// ─── State ───────────────────────────────────────────────────────
let modules = [];
let moduleCounter = 0;
let actCounter = 0;
let undoStack = [];
let redoStack = [];
let _ignoreHistory = false;

const passGradeEl = document.getElementById('pass-grade');
const maxGradeEl  = document.getElementById('max-grade');
passGradeEl.addEventListener('change', () => { pushHistory(); recalcAll(); markUnsaved(); });
maxGradeEl.addEventListener('change',  () => { pushHistory(); recalcAll(); markUnsaved(); });

// ─── History ─────────────────────────────────────────────────────
function snapshot() {
  return JSON.stringify({
    modules: modules.map(m => ({ mid:m.mid, name:m.name, open:m.open, activities:m.activities.map(a=>({...a})) })),
    moduleCounter, actCounter,
    passGrade: passGradeEl.value, maxGrade: maxGradeEl.value
  });
}
function pushHistory() {
  if (_ignoreHistory) return;
  undoStack.push(snapshot()); redoStack = []; updateHistoryBtns();
}
function updateHistoryBtns() {
  document.getElementById('btn-undo').disabled = undoStack.length === 0;
  document.getElementById('btn-redo').disabled = redoStack.length === 0;
}
function restoreSnapshot(snap) {
  const s = JSON.parse(snap);
  _ignoreHistory = true;
  passGradeEl.value = s.passGrade; maxGradeEl.value = s.maxGrade;
  moduleCounter = s.moduleCounter; actCounter = s.actCounter;
  modules = [];
  document.getElementById('modules-container').innerHTML = '';
  s.modules.forEach(m => {
    renderModule(m.mid, m.name, m.activities, m.open);
    modules.push({ mid:m.mid, name:m.name, open:m.open, activities:m.activities, _final:null });
  });
  recalcAll(); _ignoreHistory = false;
}
function undo() {
  if (!undoStack.length) return;
  redoStack.push(snapshot()); restoreSnapshot(undoStack.pop());
  updateHistoryBtns(); markUnsaved();
}
function redo() {
  if (!redoStack.length) return;
  undoStack.push(snapshot()); restoreSnapshot(redoStack.pop());
  updateHistoryBtns(); markUnsaved();
}

// ─── Save ─────────────────────────────────────────────────────────
function saveState() {
  localStorage.setItem('notasApp_save', snapshot());
  const el = document.getElementById('save-status');
  el.textContent = '✓ ' + new Date().toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'});
  el.className = 'save-status saved';
  showToast('¡Guardado!');
}
function markUnsaved() {
  const el = document.getElementById('save-status');
  if (!el.className.includes('unsaved')) {
    el.textContent = '● Sin guardar'; el.className = 'save-status unsaved';
  }
}

// ─── Toast ────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ─── Module CRUD ──────────────────────────────────────────────────
function doAddModule() {
  pushHistory();
  const mid = moduleCounter++;
  const acts = [
    { id:actCounter++, name:'Parcial 1', grade:'', pct:15 },
    { id:actCounter++, name:'Corto 1',   grade:'', pct:10 },
    { id:actCounter++, name:'Parcial 2', grade:'', pct:15 },
    { id:actCounter++, name:'Taller 1',  grade:'', pct:10 },
    { id:actCounter++, name:'Parcial 3', grade:'', pct:15 },
    { id:actCounter++, name:'Corto 2',   grade:'', pct:10 },
    { id:actCounter++, name:'Taller 2',  grade:'', pct:10 },
    { id:actCounter++, name:'Parcial 4', grade:'', pct:15 },
  ];
  modules.push({ mid, name:'', open:true, activities:acts, _final:null });
  renderModule(mid, '', acts, true);
  recalcModule(mid); recalcSummary(); markUnsaved();
}

function renderModule(mid, name, acts, open) {
  const container = document.getElementById('modules-container');
  const div = document.createElement('div');
  div.className = 'module-card' + (open ? ' open' : '');
  div.id = `module-${mid}`;
  div.innerHTML = buildModuleHTML(mid, name, acts);
  container.appendChild(div);
}

function buildModuleHTML(mid, name, acts) {
  // Mobile: activity cards
  const mobileRows = acts.map(a => buildActivityCardHTML(mid, a)).join('');
  // Desktop: table rows
  const tableRows = acts.map(a => buildRowHTML(mid, a)).join('');
  const dn = name || '';
  return `
    <div class="module-header" onclick="toggleModule(${mid})">
      <div class="module-left">
        <div class="module-dot"></div>
        <div class="module-name-display${dn ? '' : ' placeholder'}" id="mname-display-${mid}">${dn || 'Nueva materia'}</div>
      </div>
      <div class="module-right">
        <div class="module-final-badge">
          <div class="module-final-label">Nota final</div>
          <div class="module-final-value neutral" id="final-${mid}">—</div>
        </div>
        <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
    </div>
    <div class="module-body" id="body-${mid}">
      <div class="name-edit-bar">
        <label>Nombre:</label>
        <input class="module-name-input" type="text" placeholder="Ej: Cálculo Integral"
          value="${dn}" oninput="updateModuleName(${mid},this.value)" onchange="pushHistory();markUnsaved()">
      </div>

      <!-- MOBILE: activity cards -->
      <div class="activities-list" id="acts-mobile-${mid}">${mobileRows}</div>

      <!-- DESKTOP: table -->
      <div class="activities-table-wrap">
        <table class="activities-table">
          <thead><tr>
            <th>Actividad</th><th>Calificación</th><th>Porcentaje</th><th>Nota Global</th><th></th>
          </tr></thead>
          <tbody id="tbody-${mid}">${tableRows}</tbody>
          <tfoot><tr class="pct-total-row">
            <td>Total porcentaje</td><td></td>
            <td class="pct-val" id="pct-total-${mid}">0%</td><td></td><td></td>
          </tr></tfoot>
        </table>
      </div>

      <!-- Mobile PCT total -->
      <div class="pct-total-bar" id="pct-bar-${mid}">
        <span>Total porcentaje</span>
        <span class="pct-val" id="pct-total-mob-${mid}">0%</span>
      </div>

      <div class="module-footer">
        <button class="btn-add-row" onclick="doAddActivity(${mid})">+ Actividad</button>
        <button class="btn-remove-module" onclick="doRemoveModule(${mid})">✕ Eliminar</button>
      </div>
    </div>`;
}

function buildActivityCardHTML(mid, a) {
  return `<div class="activity-card" id="act-card-${mid}-${a.id}">
    <div class="activity-row1">
      <input class="act-name-input" type="text" placeholder="Nombre actividad"
        value="${a.name}" oninput="updateActivity(${mid},${a.id},'name',this.value)" onchange="pushHistory();markUnsaved()">
      <button class="act-delete-btn" onclick="doRemoveActivity(${mid},${a.id})">✕</button>
    </div>
    <div class="activity-row2">
      <div class="act-field">
        <div class="act-field-label">Calificación</div>
        <input class="act-number-input" type="number" inputmode="decimal" placeholder="0.00" min="0" step="0.01"
          value="${a.grade}" oninput="updateActivity(${mid},${a.id},'grade',this.value)" onchange="pushHistory();markUnsaved()">
      </div>
      <div class="act-field">
        <div class="act-field-label">Porcentaje</div>
        <input class="act-number-input" type="number" inputmode="decimal" placeholder="%" min="0" max="100" step="0.5"
          value="${a.pct}" oninput="updateActivity(${mid},${a.id},'pct',this.value)" onchange="pushHistory();markUnsaved()">
      </div>
      <div class="act-ng-wrap">
        <div class="act-field-label">Nota Global</div>
        <div class="nota-global empty" id="ng-mob-${mid}-${a.id}">—</div>
      </div>
    </div>
  </div>`;
}

function buildRowHTML(mid, a) {
  return `<tr id="row-${mid}-${a.id}">
    <td><input class="td-input" type="text" placeholder="Actividad"
      value="${a.name}" oninput="updateActivity(${mid},${a.id},'name',this.value)" onchange="pushHistory();markUnsaved()"></td>
    <td><input class="td-input num" type="number" placeholder="0.00" min="0" step="0.01"
      value="${a.grade}" oninput="updateActivity(${mid},${a.id},'grade',this.value)" onchange="pushHistory();markUnsaved()"></td>
    <td><input class="td-input num" type="number" placeholder="%" min="0" max="100" step="0.5"
      value="${a.pct}" oninput="updateActivity(${mid},${a.id},'pct',this.value)" onchange="pushHistory();markUnsaved()"></td>
    <td><span class="nota-global empty" id="ng-${mid}-${a.id}">—</span></td>
    <td><button class="btn-remove-row" onclick="doRemoveActivity(${mid},${a.id})">✕</button></td>
  </tr>`;
}

function toggleModule(mid) {
  const card = document.getElementById(`module-${mid}`);
  const m = modules.find(m => m.mid === mid);
  if (!card || !m) return;
  card.classList.toggle('open');
  m.open = card.classList.contains('open');
}

function updateModuleName(mid, val) {
  const m = modules.find(m => m.mid === mid);
  if (!m) return; m.name = val;
  const disp = document.getElementById(`mname-display-${mid}`);
  if (disp) { disp.textContent = val || 'Nueva materia'; disp.className = 'module-name-display' + (val ? '' : ' placeholder'); }
}

function updateActivity(mid, aid, field, val) {
  const m = modules.find(m => m.mid === mid); if (!m) return;
  const a = m.activities.find(a => a.id === aid);
  if (a) { a[field] = val; recalcModule(mid); recalcSummary(); }
}

function doAddActivity(mid) {
  pushHistory();
  const m = modules.find(m => m.mid === mid); if (!m) return;
  const aid = actCounter++;
  const a = { id:aid, name:'', grade:'', pct:'' };
  m.activities.push(a);
  // Add to mobile list
  const mobileList = document.getElementById(`acts-mobile-${mid}`);
  if (mobileList) { const tmp = document.createElement('div'); tmp.innerHTML = buildActivityCardHTML(mid, a); mobileList.appendChild(tmp.firstElementChild); }
  // Add to desktop table
  const tbody = document.getElementById(`tbody-${mid}`);
  if (tbody) { const tmp = document.createElement('table'); tmp.innerHTML = `<tbody>${buildRowHTML(mid, a)}</tbody>`; tbody.appendChild(tmp.querySelector('tr')); }
  recalcModule(mid); recalcSummary(); markUnsaved();
}

function doRemoveActivity(mid, aid) {
  pushHistory();
  const m = modules.find(m => m.mid === mid); if (!m) return;
  m.activities = m.activities.filter(a => a.id !== aid);
  ['act-card','row'].forEach(prefix => { const el = document.getElementById(`${prefix}-${mid}-${aid}`); if (el) el.remove(); });
  recalcModule(mid); recalcSummary(); markUnsaved();
}

function doRemoveModule(mid) {
  pushHistory();
  modules = modules.filter(m => m.mid !== mid);
  const card = document.getElementById(`module-${mid}`); if (card) card.remove();
  recalcSummary(); markUnsaved();
}

// ─── Recalc ───────────────────────────────────────────────────────
function recalcModule(mid) {
  const m = modules.find(m => m.mid === mid); if (!m) return;
  const passGrade = parseFloat(passGradeEl.value) || 6;
  let totalPct = 0, finalNote = 0, hasAny = false;

  m.activities.forEach(a => {
    const g = a.grade !== '' ? parseFloat(a.grade) : null;
    const p = a.pct !== '' ? parseFloat(a.pct) : 0;
    totalPct += p;
    const ng = (g !== null && !isNaN(g)) ? g * (p / 100) : null;
    if (ng !== null) { hasAny = true; finalNote += ng; }

    const cls = ng !== null ? (g >= passGrade ? 'has-val' : 'zero') : 'empty';
    const txt = ng !== null ? ng.toFixed(1) : '—';

    // update mobile
    const ngMob = document.getElementById(`ng-mob-${mid}-${a.id}`);
    if (ngMob) { ngMob.textContent = txt; ngMob.className = `nota-global ${cls}`; }
    // update desktop
    const ngDesk = document.getElementById(`ng-${mid}-${a.id}`);
    if (ngDesk) { ngDesk.textContent = txt; ngDesk.className = `nota-global ${cls}`; }
  });

  const pctStr = totalPct.toFixed(0) + '%';
  const pctCls = 'pct-val' + (totalPct > 100 ? ' over' : totalPct === 100 ? ' ok' : '');
  ['pct-total','pct-total-mob'].forEach(id => {
    const el = document.getElementById(`${id}-${mid}`); if (el) { el.textContent = pctStr; el.className = pctCls; }
  });

  const finalEl = document.getElementById(`final-${mid}`);
  if (finalEl) {
    if (!hasAny) { finalEl.textContent = '—'; finalEl.className = 'module-final-value neutral'; m._final = null; }
    else { finalEl.textContent = finalNote.toFixed(1); finalEl.className = 'module-final-value ' + (finalNote >= passGrade ? 'pass' : 'fail'); m._final = finalNote; }
  }
}

function recalcAll() { modules.forEach(m => recalcModule(m.mid)); recalcSummary(); }

function recalcSummary() {
  const passGrade = parseFloat(passGradeEl.value) || 6;
  const maxGrade  = parseFloat(maxGradeEl.value)  || 10;
  const wf = modules.filter(m => m._final != null);
  if (!wf.length) {
    document.getElementById('sum-avg').textContent = '—'; document.getElementById('sum-avg').className = 'stat-value neutral';
    document.getElementById('sum-pass').textContent = '—'; document.getElementById('sum-fail').textContent = '—';
    document.getElementById('sum-bar').style.width = '0%'; document.getElementById('sum-bar').className = 'progress-bar';
    document.getElementById('sum-verdict').textContent = 'Agrega materias para ver tu resumen';
    document.getElementById('sum-verdict').className = 'verdict neutral'; return;
  }
  const avg    = wf.reduce((s,m) => s + m._final, 0) / wf.length;
  const passed = wf.filter(m => m._final >= passGrade).length;
  const failed = wf.length - passed;
  const pct    = Math.min((avg / maxGrade) * 100, 100);
  const avgEl  = document.getElementById('sum-avg');
  avgEl.textContent = avg.toFixed(2); avgEl.className = 'stat-value ' + (avg >= passGrade ? 'pass' : 'fail');
  document.getElementById('sum-pass').textContent = passed;
  document.getElementById('sum-fail').textContent = failed;
  const bar = document.getElementById('sum-bar');
  bar.style.width = pct + '%'; bar.className = 'progress-bar' + (avg < passGrade ? ' fail' : '');
  const verdict = document.getElementById('sum-verdict');
  verdict.textContent = avg >= passGrade ? `✓ Promedio ${avg.toFixed(2)} — ¡Vas aprobando!` : `✗ Promedio ${avg.toFixed(2)} — Necesitas mejorar`;
  verdict.className = 'verdict ' + (avg >= passGrade ? 'pass' : 'fail');
}

// ─── Save / Load ──────────────────────────────────────────────────
function loadSaved() {
  const snap = localStorage.getItem('notasApp_save');
  if (snap) {
    try {
      _ignoreHistory = true; restoreSnapshot(snap); _ignoreHistory = false;
      const el = document.getElementById('save-status');
      el.textContent = '✓ Cargado'; el.className = 'save-status saved'; return true;
    } catch(e) {}
  }
  return false;
}

const CARRERA = [

let avanceSubjects = [];
let avanceCounter  = 0;

function buildDefaultAvance() {
  avanceSubjects = []; avanceCounter = 0;
  CARRERA.forEach(c => c.subjects.forEach(s =>
    avanceSubjects.push({ id:avanceCounter++, cycle:c.cycle, name:s.name, uv:s.uv, approved:false })
  ));
}

function openAvance() { renderAvanceList(); recalcAvance(); document.getElementById('avance-overlay').classList.add('open'); }
function closeAvance() { document.getElementById('avance-overlay').classList.remove('open'); saveAvanceState(); }
function closeAvanceOutside(e) { if (e.target === document.getElementById('avance-overlay')) closeAvance(); }

function renderAvanceList() {
  const list = document.getElementById('uv-subjects-list');
  list.innerHTML = '';
  const cycles = [...new Set(avanceSubjects.map(s => s.cycle))];
  cycles.forEach(cycle => {
    const lbl = document.createElement('div');
    lbl.className = 'cycle-label'; lbl.textContent = '— ' + cycle;
    list.appendChild(lbl);
    avanceSubjects.filter(s => s.cycle === cycle).forEach(s => {
      const row = document.createElement('div');
      row.className = 'uv-row' + (s.approved ? ' approved' : '');
      row.id = `uv-row-${s.id}`;
      row.innerHTML = `
        <div class="uv-check" id="uv-check-${s.id}">${s.approved ? '✓' : ''}</div>
        <div class="uv-name">${s.name}</div>
        <div class="uv-input-wrap" onclick="event.stopPropagation()">
          <input class="uv-input" type="number" inputmode="numeric" min="1" max="20" step="1"
            value="${s.uv}" oninput="updateAvanceUV(${s.id},this.value)">
          <span class="uv-label">UV</span>
        </div>`;
      row.addEventListener('click', e => { if (e.target.tagName==='INPUT') return; toggleAvanceApproved(s.id); });
      list.appendChild(row);
    });
  });
}

function toggleAvanceApproved(sid) {
  const s = avanceSubjects.find(s => s.id === sid); if (!s) return;
  s.approved = !s.approved;
  const row = document.getElementById(`uv-row-${sid}`);
  const chk = document.getElementById(`uv-check-${sid}`);
  s.approved ? (row.classList.add('approved'), chk.textContent='✓') : (row.classList.remove('approved'), chk.textContent='');
  recalcAvance(); saveAvanceState();
}

function updateAvanceUV(sid, val) {
  const s = avanceSubjects.find(s => s.id === sid);
  if (s) { s.uv = parseFloat(val)||0; recalcAvance(); saveAvanceState(); }
}

function addAvanceSubject() {
  avanceSubjects.push({ id:avanceCounter++, cycle:'Extra', name:'Nueva materia', uv:4, approved:false });
  renderAvanceList(); recalcAvance();
}

function recalcAvance() {
  const totalUV = parseFloat(document.getElementById('total-uv-input').value) || 161;
  document.getElementById('avance-uv-total-label').textContent = totalUV;
  const uvDone = avanceSubjects.filter(s => s.approved).reduce((sum,s) => sum + (parseFloat(s.uv)||0), 0);
  const pct = Math.min((uvDone / totalUV) * 100, 100);
  document.getElementById('avance-uv-done').textContent  = uvDone;
  document.getElementById('avance-uv-grand').textContent = uvDone + ' UV';
  document.getElementById('avance-pct').textContent = pct.toFixed(1) + '%';
  // r=52 → circ = 2π*52 ≈ 326.7
  const circ = 2 * Math.PI * 52;
  document.getElementById('avance-ring').style.strokeDashoffset = circ - (pct/100)*circ;
}

function saveAvanceState() {
  localStorage.setItem('notasApp_avance', JSON.stringify({
    subjects: avanceSubjects, counter: avanceCounter,
    totalUV: document.getElementById('total-uv-input').value
  }));
}

function loadAvanceState() {
  try {
    const raw = localStorage.getItem('notasApp_avance');
    if (raw) {
      const d = JSON.parse(raw);
      if (d.subjects && d.subjects.length) {
        avanceSubjects = d.subjects; avanceCounter = d.counter || d.subjects.length;
        if (d.totalUV) document.getElementById('total-uv-input').value = d.totalUV;
        return;
      }
    }
  } catch(e) {}
  buildDefaultAvance();
}

// ─── Init ─────────────────────────────────────────────────────────
if (!loadSaved()) {
  const mid = moduleCounter++;
  const acts = [
    { id:actCounter++, name:'Parcial 1', grade:'',    pct:15 },
    { id:actCounter++, name:'Corto 1',   grade:'3.6', pct:10 },
    { id:actCounter++, name:'Parcial 2', grade:'',    pct:15 },
    { id:actCounter++, name:'Taller 1',  grade:'',    pct:10 },
    { id:actCounter++, name:'Parcial 3', grade:'',    pct:15 },
    { id:actCounter++, name:'Corto 2',   grade:'',    pct:10 },
    { id:actCounter++, name:'Taller 2',  grade:'',    pct:10 },
    { id:actCounter++, name:'Parcial 4', grade:'',    pct:15 },
  ];
  modules.push({ mid, name:'Cálculo Integral', open:true, activities:acts, _final:null });
  renderModule(mid, 'Cálculo Integral', acts, true);
  recalcModule(mid); recalcSummary();
}
loadAvanceState();
updateHistoryBtns();
</script>
